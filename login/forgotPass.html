<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - BookWorm</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-container {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .forgot-container .logo {
            margin-bottom: 1.5rem;
        }

        .forgot-container .logo img {
            width: 60px;
            height: 60px;
            border-radius: 12px;
        }

        .forgot-container h2 {
            color: #1a1a1a;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .forgot-container .subtitle {
            color: #666666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }

        .forgot-form .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        .forgot-form .input-group label {
            display: block;
            color: #333333;
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        .forgot-form .input-group input {
            width: 100%;
            padding: 12px 15px;
            font-size: 0.95rem;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .forgot-form .input-group input:focus {
            border-color: #333333;
            background: #ffffff;
        }

        .forgot-form .input-group input::placeholder {
            color: #888888;
        }

        .forgot-form button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #333333, #666666);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .forgot-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(51, 51, 51, 0.3);
        }

        .back-link {
            margin-top: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            color: #666666;
            font-size: 0.9rem;
        }

        .back-link a {
            color: #333333;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: #000000;
            text-decoration: underline;
        }

        /* Success/Error Messages */
        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.15);
            color: #27ae60;
            border: 1px solid rgba(46, 204, 113, 0.3);
            display: block;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.3);
            display: block;
        }

        /* New Password Section (hidden by default) */
        .new-password-section {
            display: none;
        }

        .new-password-section.active {
            display: block;
        }

        .verification-section {
            display: block;
        }

        .verification-section.hidden {
            display: none;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffffff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .forgot-form button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="logo">
            <img src="/img/logo.jpg" alt="BookWorm">
        </div>
        
        <!-- Coming Soon Section -->
        <div class="coming-soon-section">
            <div class="icon-container">
                <i class='bx bx-time-five'></i>
            </div>
            <h2>Coming Soon</h2>
            <p class="subtitle">We're working hard to bring you the password reset feature. This page will be available in a future update.</p>
            <p class="note">In the meantime, please contact support if you need assistance.</p>
        </div>

        <div class="back-link">
            <i class='bx bx-arrow-back'></i>
            <a href="index.html">Back to Login</a>
        </div>
    </div>

    <style>
        /* Coming Soon Specific Styles */
        .coming-soon-section {
            padding: 1rem 0;
        }
        
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, #333333, #666666);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .icon-container i {
            font-size: 2.5rem;
            color: #ffffff;
        }
        
        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(51, 51, 51, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 20px 10px rgba(51, 51, 51, 0);
            }
        }
        
        .forgot-container h2 {
            color: #1a1a1a;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        
        .forgot-container .subtitle {
            color: #666666;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }
        
        .forgot-container .note {
            color: #888888;
            font-size: 0.85rem;
            font-style: italic;
            padding: 1rem;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 3px solid #333333;
        }
    </style>
</body>
</html>
