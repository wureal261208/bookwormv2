<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="container" class="container">
        <!-- FORM SECTION -->
        <div class="row">
            <!-- SIGN UP -->
            <div class="col align-items-center flex-col sign-up">
                <div class="form-wrapper align-items-center">
                    <div class="form sign-up">
                        <div class="input-group">
                            <i class='bx bx-envelope'></i>
                            <input type="email" id="inputUser" placeholder="Email">
                            <span class="errorMessage" id="errorUserReg"></span>
                        </div>
                        <div class="input-group">
                            <i class='bx bxs-lock-alt'></i>
                            <input type="password" id="inputPass" placeholder="Password">
                            <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" data-target="inputPass">
                                <i class='bx bx-show'></i>
                            </button>
                            <span class="errorMessage" id="errorPassReg"></span>
                        </div>
                        <div class="input-group">
                            <i class='bx bxs-lock-alt'></i>
                            <input type="password" id="inputRedeemPass" placeholder="Confirm password">
                            <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" data-target="inputRedeemPass">
                                <i class='bx bx-show'></i>
                            </button>
                            <span class="errorMessage" id="errorRedeemPass"></span>
                        </div>
                        <button id="btnRegister">
                            Register now
                        </button>
                        <p>
                            <span style="font-size: 0.8rem; color: var(--text);">
                                Already have an account?
                            </span>
                            <b style="font-size: 0.8rem; color: var(--text); cursor: pointer;" onclick="toggle()"
                                class="pointer">
                                Login here
                            </b>
                        </p>
                    </div>
                </div>

            </div>
            <!-- END SIGN UP -->
            <!-- SIGN IN -->
            <div class="col align-items-center flex-col sign-in">
                <div class="form-wrapper align-items-center">
                    <div class="form sign-in">
                        <div class="input-group">
                            <i class='bx bxs-user'></i>
                            <input type="email" id="signin-username" placeholder="Email">
                            <span class="errorMessage" id="errorUserLogin"></span>
                        </div>
                        <div class="input-group">
                            <i class='bx bxs-lock-alt'></i>
                            <input type="password" id="signin-password" placeholder="Password">
                            <button type="button" class="toggle-password" aria-label="Show password" aria-pressed="false" data-target="signin-password">
                                <i class='bx bx-show'></i>
                            </button>
                            <span class="errorMessage" id="errorPassLogin"></span>
                        </div>
                        <button id="signin-btn">
                            Login now
                        </button>
                        <p style="display: flex; justify-content: space-between; width: 100%;">
                            <a href="../main/index-none.html"
                                style="text-decoration: none; font-size: 0.8rem; color: var(--text);">
                                <i class='bx bx-arrow-back'></i>
                                Back to Home
                            </a>
                            <a href="forgotPass.html"
                                style="text-decoration: none; font-size: 0.8rem; color: var(--text);"
                                id="forgot-password">
                                Forgot password?
                            </a>
                        </p>
                        <p>
                            <span style="font-size: 0.8rem; color: var(--text);">
                                Don't have an account?
                            </span>
                            <b style="font-size: 0.8rem; color: var(--text); cursor: pointer;" onclick="toggle()"
                                class="pointer">
                                Register here
                            </b>
                        </p>
                    </div>
                </div>
                <div class="form-wrapper">

                </div>
            </div>
            <!-- END SIGN IN -->
        </div>
        <!-- END FORM SECTION -->
        <!-- CONTENT SECTION -->
        <div class="row content-row">
            <!-- SIGN IN CONTENT -->
            <div class="col align-items-center flex-col">
                <div class="text sign-in">
                    <h2>
                        Welcome back
                    </h2>

                </div>
                <div class="img sign-in">

                </div>
            </div>
            <!-- END SIGN IN CONTENT -->
            <!-- SIGN UP CONTENT -->
            <div class="col align-items-center flex-col">
                <div class="img sign-up">

                </div>
                <div class="text sign-up">
                    <h2>
                        Join with us
                    </h2>

                </div>
            </div>
            <!-- END SIGN UP CONTENT -->
        </div>
        <!-- END CONTENT SECTION -->
    </div>

    <script src="../script/lazyLoad.js" defer></script>
    <script src="script.js"></script>
    <script>
        // Enhanced Password toggle functionality with better UX and accessibility
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.setAttribute('type', 'button');
            button.style.cursor = 'pointer';
            // indicate current state to assistive tech
            button.setAttribute('aria-pressed', 'false');

            const toggleIcon = button.querySelector('i');
            if (toggleIcon) {
                toggleIcon.style.pointerEvents = 'none';
            }

            button.addEventListener('click', function () {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (!input) return;

                const icon = this.querySelector('i');

                // Toggle password visibility
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.remove('bx-show');
                    icon.classList.add('bx-hide');
                    this.setAttribute('aria-label', 'Hide password');
                    this.setAttribute('aria-pressed', 'true');
                } else {
                    input.type = 'password';
                    icon.classList.remove('bx-hide');
                    icon.classList.add('bx-show');
                    this.setAttribute('aria-label', 'Show password');
                    this.setAttribute('aria-pressed', 'false');
                }
            });

            // Keyboard accessibility - Enter/Space key toggles password
            button.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });
        });
    </script>
</body>
