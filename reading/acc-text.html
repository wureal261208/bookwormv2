<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>BookWorm · Read (Text) – Accessible</title>
    <!-- global theme & utilities -->
    <link rel="stylesheet" href="../main/style.css" />
    <!-- Tailwind for rapid layout tweaks (kept for other pages consistency) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com" defer></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
    <!-- font handled by ../main/style.css (Story Script) -->
    <style>
        /* use global font from main site */
        .reader-slide {
            display: none;
        }

        .reader-slide.active {
            display: block;
        }
        #reader-container { position: relative; padding-top: 3rem; }
        #toggle-mode { background: rgba(255,255,255,0.9); }
        /* make switch icon black */
        #toggle-mode i { color: #000 !important; }
        /* ensure prev/next icons are white and slightly larger */
        #prev-page i, #next-page i { color: var(--white) !important; font-size:1.25rem; }
        /* navigation button details */
        #prev-page, #next-page {
            border: 2px solid var(--primary-color);
            background: var(--secondary-color);
            color: var(--white);
            transition: background 0.3s, transform 0.2s;
            border-radius: 0.5rem;
            min-width: 120px;
        }
        #prev-page:hover, #next-page:hover {
            background: var(--primary-color);
            transform: translateY(-2px) scale(1.02);
        }
        #toggle-mode {
            border: 2px solid var(--secondary-color);
            border-radius: 0.5rem;
            min-width: 140px;
        }
        #toggle-mode:hover {
            background: var(--secondary-color);
            color: var(--white);
        }
        /* icons inside buttons should always be white, except toggle icon */
        #prev-page i, #next-page i {
            color: var(--white) !important;
        }
        /* toggle icon black for clarity */
        #toggle-mode i {
            color: var(--black) !important;
        }
        /* Center prev/next buttons in the middle of the content */
        #reader-slider {
            position: relative;
            min-height: 300px;
        }
        #prev-page, #next-page {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
        }
        #prev-page {
            left: 10px;
        }
        #next-page {
            right: 10px;
        }
        /* recommendation cards */
        .recommend-card {
            display: inline-block;
            width: 160px;
            margin: 0 0.5rem;
            text-align: center;
        }
        .recommend-card img {
            width: 100%;
            border-radius: 0.5rem;
        }
        .recommend-card h3 {
            font-size: 0.9rem;
            margin: 0.4rem 0 0.2rem;
        }
        .recommend-card .rating,
        .recommend-card .views {
            font-size: 0.8rem;
            color: var(--gray-dark);
        }
    </style>
</head>

<body>
    <!-- Navbar for authenticated / accessible users -->
    <header>
    <nav class="fixed top-0 left-0 right-0 z-50 custom-navbar border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <a href="#" class="text-2xl font-bold flex items-center gap-2">
                            <img class="h-8 w-auto" src="/img/logo.jpg" alt="BookWorm">
                            <span>BookWorm</span>
                        </a>
                    </div>
                    <div class="hidden md:block ml-10">
                        <div class="flex items-baseline space-x-4 nav-links">
                            <a href="#" class="px-3 py-2 rounded-md text-sm font-medium nav-link active"><i
                                    class='bx bx-search' aria-hidden="true"></i> Browse</a>
                            <a href="categories.html" class="px-3 py-2 rounded-md text-sm font-medium nav-link"><i
                                    class='bx bx-category' aria-hidden="true"></i> Categories</a>
                            <a href="explore.html" class="px-3 py-2 rounded-md text-sm font-medium nav-link"><i
                                    class='bx bx-compass' aria-hidden="true"></i> Explore</a>
                        </div>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <!-- Search Bar with Dropdown -->
                    <div class="relative hidden sm:block" id="search-wrapper">
                        <i class='bx bx-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'
                            aria-hidden="true"></i>
                        <input type="text" id="main-search-input" placeholder="Search books..."
                            class="custom-input text-sm pl-10 pr-10" autocomplete="off">
                        <button type="button" id="search-clear-btn"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600 hidden">
                            <i class='bx bx-x'></i>
                        </button>
                        <!-- Search Results Dropdown -->
                        <div id="search-dropdown"
                            class="absolute top-full left-0 right-0 mt-2 bg-white rounded-lg shadow-lg max-h-96 overflow-y-auto z-50 hidden">
                            <div id="search-results"></div>
                        </div>
                    </div>
                    <!-- Notification -->
                    <div class="relative" id="notification-container">
                        <button id="notification-btn" class="p-1.5 rounded-full text-white hover:bg-white/20">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                            </svg>
                            <span id="notification-badge"
                                class="absolute -top-1 -right-1 bg-red-600 text-white text-xs font-bold rounded-full h-5 w-5 flex items-center justify-center hidden shadow-lg border-2 border-white"></span>
                        </button>
                        <!-- Notification Dropdown -->
                        <div id="notification-dropdown"
                            class="absolute right-0 mt-2 w-80 bg-white rounded-lg shadow-lg py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50 max-h-96 overflow-y-auto">
                            <div class="px-4 py-2 border-b border-gray-200">
                                <h4 class="font-semibold text-black">Notifications</h4>
                            </div>
                            <div id="notification-list" class="max-h-64 overflow-y-auto">
                                <p class="px-4 py-3 text-sm text-black text-center">No new notifications</p>
                            </div>
                            <div class="px-4 py-2 border-t border-gray-200">
                                <button id="mark-all-read" class="text-sm text-blue-600 hover:text-blue-800">Mark all as
                                    read</button>
                            </div>
                        </div>
                        <!-- Show dropdown on click for notification button -->
                        <script>
                            document.addEventListener('DOMContentLoaded', function () {
                                const notifBtn = document.getElementById('notification-btn');
                                const notifDropdown = document.getElementById('notification-dropdown');
                                const container = document.getElementById('notification-container');

                                if (notifBtn && notifDropdown && container) {
                                    notifBtn.addEventListener('click', function (e) {
                                        e.stopPropagation();
                                        notifDropdown.classList.toggle('opacity-0');
                                        notifDropdown.classList.toggle('invisible');
                                    });

                                    document.addEventListener('click', function (e) {
                                        if (!container.contains(e.target)) {
                                            notifDropdown.classList.add('opacity-0');
                                            notifDropdown.classList.add('invisible');
                                        }
                                    });
                                }
                            });
                        </script>
                    </div>
                    <!-- Avatar -->
                    <div class="relative group">
                        <button class="flex items-center gap-2">
                            <img class="h-9 w-9 rounded-full object-cover border-2 border-white/50"
                                src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80"
                                alt="User">
                        </button>
                        <!-- Dropdown Menu -->
                        <div
                            class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                            <p id="user-email-display" class="px-4 py-2 text-sm font-semibold text-gray-800 truncate">
                            </p>
                            <a style="color: #333333" href="../login/index.html"
                                class="dropdown-item block px-4 py-2 text-sm font-semibold">
                                <i class='bx bx-log-out'></i> Logout
                            </a>
                        </div>
                    </div>
                    <div class="md:hidden">
                        <button
                            class="mobile-menu-btn inline-flex items-center justify-center p-2 rounded-md text-white">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h16M4 18h16" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="mobile-menu hidden md:hidden fixed top-16 left-0 right-0 z-40"
            style="background:linear-gradient(135deg,var(--secondary-color),var(--primary-color))">
            <div class="px-4 py-4 space-y-2">
                <a href="#" class="block px-3 py-2 rounded-md text-sm font-medium nav-link active">Browse</a>
                <a href="categories.html" class="block px-3 py-2 rounded-md text-sm font-medium nav-link">Categories</a>
                <a href="explore.html" class="block px-3 py-2 rounded-md text-sm font-medium nav-link">My Library</a>
            </div>
        </div>
    </nav>
    </header>

    <div class="h-16"></div>

    <div class="max-w-4xl mx-auto px-4 pt-6">
        <a href="../detail/index-acc.html" class="inline-flex items-center gap-2 text-gray-600 hover:text-black transition-colors">
            <i class='bx bx-arrow-back text-xl'></i>
            <span>Back to Book Details</span>
        </a>
    </div>

    <!-- Reader area -->
    <main class="max-w-4xl mx-auto px-4 py-12" id="reader-main">
        <div id="reader-container" class="relative">            <!-- book info pulled from localStorage -->
            <div id="book-info" class="mb-6 flex items-center gap-4"></div>
            <button id="toggle-mode" title="Switch read mode"
                class="btn-action btn-details text-xl px-4 py-2 absolute top-0 left-1/2 transform -translate-x-1/2 z-10">
                <i class="bx bx-sort-alt-2"></i>
                <span id="mode-label" class="ml-2">Switching box</span>
            </button>
            <div id="reader-slider">
                <button id="prev-page" class="btn-action btn-read text-lg px-5 py-3" aria-label="Previous page"><i class="bx bx-chevron-left"></i></button>
                <button id="next-page" class="btn-action btn-read text-lg px-5 py-3" aria-label="Next page"><i class="bx bx-chevron-right"></i></button>
            </div>
        </div>

        <!-- "You may like" recommendations -->
        <section class="mt-12">
            <h2 class="text-2xl font-bold mb-4">You may like</h2>
            <div class="carousel">
                <div class="slider" id="recommend-slider"></div>
            </div>
        </section>
    </main>

    <footer class="site-footer mt-12" aria-labelledby="feedback-heading">
        <div class="footer-container">
            <div class="footer-top">
                <div class="mt-8 bg-white p-4 rounded-lg shadow">
                    <h3 class="text-lg font-bold mb-2">Community Chat</h3>
                    <p class="text-gray-500">Coming soon...</p>
                </div>
            </div>
            <div class="footer-bottom">
                <div class="contact-info">
                    <p><strong>BookWorm</strong> • hello@bookworm.vn</p>
                    <p><a href="tel:+842839301234">+84 28 3930 1234</a> • Ho Chi Minh City, Vietnam</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../main/script-acc.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            let current = parseInt(params.get('chapter') || params.get('edition') || '1') - 1;

            const sampleTexts = [
                "Once upon a time, in a land far away, beyond the misty mountains and endless forests, there lived people who believed that magic had long vanished from the world. Yet hidden beneath the silence of ancient ruins and forgotten temples, traces of that magic still quietly waited to be discovered.",
                "One quiet evening, the hero slowly opened the ancient book he had found buried deep within a ruined library. Dust rose into the air as the fragile pages turned, revealing symbols and stories that no one had read for centuries. With every word he read, it felt as if the past itself was awakening.",
                "Suddenly, a powerful storm swept across the plains outside, dark clouds swirling like restless spirits. Thunder echoed across the sky, and the wind carried whispers that seemed almost alive. It was as though the world itself was responding to the secrets hidden within the book.",
                "Standing near the window, she whispered words that hadn’t been spoken in centuries. The language was old, older than the kingdoms that once ruled the land. As the final syllable left her lips, the air shimmered faintly with a strange and forgotten power.",
                "At last, after trials, danger, and revelations that changed everything they believed, the journey was over. But as the sun rose over the horizon, illuminating a new path ahead, they realized something important — the story they had lived was only the beginning of something far greater.",
                "Beyond the hills, far past the villages they once called home, new lands waited to be explored. Rumors spoke of cities hidden beneath the sea, forests where time itself moved differently, and ancient guardians that still watched over the world from the shadows.",
                "The hero closed the book slowly, realizing that its final pages were still blank. It was not a story meant only to be read — it was a story meant to be continued. With determination in his eyes and the quiet promise of adventure in the air, he took his first step toward the unknown future."
            ];

            const slider = document.getElementById('reader-slider');
            sampleTexts.forEach(text => {
                const div = document.createElement('div');
                div.className = 'reader-slide';
                div.innerHTML = `<p class="text-lg leading-relaxed">${text}</p>`;
                slider.appendChild(div);
            });

            const slides = slider.querySelectorAll('.reader-slide');
            let continuous = false;
            const recSlider = document.querySelector('#reader-main .carousel .slider');
            const recommendations = [
                {cover:'https://via.placeholder.com/120x180?text=Book+1',title:'The Lost Pages',rating:4.2,views:1320},
                {cover:'https://via.placeholder.com/120x180?text=Book+2',title:'Mystery of the Isle',rating:4.7,views:980},
                {cover:'https://via.placeholder.com/120x180?text=Book+3',title:'Journey Through Time',rating:4.5,views:1500},
                {cover:'https://via.placeholder.com/120x180?text=Book+4',title:'Secrets of the Forest',rating:4.0,views:760}
            ];
            recommendations.forEach(b=>{
                const card=document.createElement('div');
                card.className='recommend-card';
                card.innerHTML = `<img src="${b.cover}" alt="${b.title} cover"><h3>${b.title}</h3><div class="rating">${b.rating} ★</div><div class="views">${b.views} views</div>`;
                recSlider.appendChild(card);
            });

            function showSlide(index) {
                if (continuous) return;
                if (index < 0 || index >= slides.length) return;
                slides.forEach((s, i) => s.style.display = i === index ? 'block' : 'none');
                current = index;
            }

            function updateMode() {
                const toggle = document.getElementById('toggle-mode');
                const label = document.getElementById('mode-label');
                const prevBtn = document.getElementById('prev-page');
                const nextBtn = document.getElementById('next-page');
                if (continuous) {
                    slides.forEach(s => s.style.display = 'block');
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                    toggle.innerHTML = '<i class="bx bx-pause-circle"></i>';
                    if (label) label.textContent = 'Continuous';
                } else {
                    slides.forEach((s,i) => s.style.display = i === current ? 'block' : 'none');
                    prevBtn.style.display = '';
                    nextBtn.style.display = '';
                    toggle.innerHTML = '<i class="bx bx-sort-alt-2"></i>';
                    if (label) label.textContent = 'Paged';
                }
            }

            document.getElementById('toggle-mode').addEventListener('click', () => {
                continuous = !continuous;
                updateMode();
            });

            document.getElementById('prev-page').addEventListener('click', () => {
                showSlide(current - 1);
            });
            document.getElementById('next-page').addEventListener('click', () => {
                showSlide(current + 1);
            });

            updateMode();
            
        });
    </script>
</body>

</html>
