<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Boxicons CDN -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

<style>
        :root {
    /* Exact Color Palette from User */
    --black: #000000;
    --white: #ffffff;
    --gray: #efefef;
    --gray-2: #757575;
    --text: #333333;
    
    /* Additional colors */
    --bg: #E7F2EF;
    --accent: #A1C2BD;
    --muted: #708993;
}

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

/* Navbar Category Dropdown */
.custom-dropdown {
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    transition: all 0.3s ease;
    cursor: pointer;
}

.custom-dropdown:hover {
    background-color: rgba(255, 255, 255, 0.2);
}

.custom-dropdown:focus {
    outline: none;
    background-color: rgba(255, 255, 255, 0.3);
}

/* Style the options in navbar dropdown */
.custom-dropdown option {
    background: var(--secondary-color);
    color: white;
    padding: 10px;
}

/* Navbar - SOLID BACKGROUND */
.custom-navbar {
    background: var(--black);
    border-bottom: 3px solid var(--accent);
    box-shadow: 0 4px 20px rgba(112, 137, 147, 0.3);
}

.custom-navbar a,
.custom-navbar .text-sm,
.custom-navbar button {
    color: var(--white);
}

.nav-links {
    display: flex;
    gap: 1rem;
}

.nav-link {
    padding: .5rem .75rem;
    border-radius: .375rem;
    color: var(--white);                   /* keep text white on dark navbar */
    background: transparent;
    text-decoration: none;
    font-weight: 600;                      /* make letters bolder */
    transition: color 0.2s, background 0.3s;
}

/* higher contrast hover states so letters remain visible */
.nav-link:hover {
    color: var(--secondary-color);
    background: rgba(255, 255, 255, 0.15);
}

.nav-link:focus {
    color: var(--secondary-color);
    /* No background change on focus - only hover */
    outline: none;
}

.nav-link.active {
    background: rgba(255, 255, 255, 0.2);
}

.getStarted {
    color: var(--white);
    background: rgba(255, 255, 255, 0.2);
    transition: all 0.3s ease;
}

.getStarted:hover {
    background: rgba(255, 255, 255, 0.3);
}

.custom-input {
    width: 16rem;
    padding-left: 2.5rem;
    padding-right: 1rem;
    padding-top: .5rem;
    padding-bottom: .5rem;
    background: #ffffff;
    border: 2px solid #A1C2BD;
    border-radius: .5rem;
    color: #333333;
}

.custom-input::placeholder {
    color: #708993;
}

.custom-input:focus {
    outline: none;
    background: #ffffff;
    border-color: #708993;
    box-shadow: 0 0 0 3px rgba(161, 194, 189, 0.3);
}

.mobile-menu {
    animation: slideDown 0.3s ease-out;
}

.mobile-menu.hidden {
    animation: slideUp 0.3s ease-out;
}

@keyframes slideDown {
    from { transform: translateY(-10px); }
    to { transform: translateY(0); }
}

@keyframes slideUp {
    from { opacity: 1; transform: translateY(0); }
    to { opacity: 0; transform: translateY(-10px); }
}

        .dropdown-menu a:hover {
            background: rgba(112, 137, 147, 0.15) !important;
        }

        @media (max-width: 640px) {
            .dropdown-menu {
                right: -1rem !important;
                left: auto !important;
                width: calc(100vw - 2rem) !important;
            }
        }

        .reader-stage {
            min-height: 420px;
        }

        .page-side-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 48px;
            height: 72px;
            border-radius: 12px;
            border: none;
            background: rgba(17, 24, 39, 0.55);
            color: #fff;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all .2s ease;
            z-index: 10;
        }

        .page-side-btn:hover {
            background: rgba(17, 24, 39, 0.8);
        }

        .page-side-left {
            left: 12px;
        }

        .page-side-right {
            right: 12px;
        }

        @media (max-width: 640px) {
            .page-side-btn {
                width: 42px;
                height: 64px;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header>
        <nav aria-label="Main navigation" class="fixed inset-x-0 top-0 z-50 custom-navbar border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <a href="../main/index-acc.html" class="flex items-center gap-2 text-2xl font-bold">
                            <img class="h-8 w-auto" src="/img/logo.jpg" alt="BookWorm logo">
                            <span>BookWorm</span>
                        </a>
    <div class="hidden md:block ml-10">
                            <div class="flex items-baseline space-x-4 nav-links">
                                <a href="#" class="nav-link active" aria-current="page"><i class='bx bx-search'></i> Browse</a>
                                <a href="#" class="nav-link"><i class='bx bx-category'></i> Categories</a>
                                <a href="#" class="nav-link"><i class='bx bx-library'></i> My Library</a>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="relative hidden sm:block">
                            <i class='bx bx-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="search" placeholder="Search books..." class="custom-input text-sm pl-10" aria-label="Search books">
                        </div>
                        <!-- notification icon -->
                        <div class="relative">
                            <button id="notification-btn" class="p-1.5 rounded-full text-white hover:bg-white/20">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                                </svg>
                            </button>
                        </div>
                        <!-- user avatar -->
                        <div class="relative group">
                            <button class="flex items-center gap-2">
                                <img class="h-9 w-9 rounded-full object-cover border-2 border-white/50" src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?ixlib=rb-4.0.3&auto=format&fit=facearea&facepad=2&w=256&h=256&q=80" alt="User">
                            </button>
                            <!-- Dropdown Menu -->
                            <div class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                                <a style="color: #333333" href="../login/index.html" class="dropdown-item block px-4 py-2 text-sm font-semibold">
                                    <i class='bx bx-log-out'></i> Logout
                                </a>
                            </div>
                        </div>
                        <button class="mobile-menu-btn md:hidden p-2 focus:outline-none" aria-expanded="false" aria-controls="mobile-menu">
                            <span class="sr-only">Open menu</span>
                            <i class='bx bx-menu text-2xl'></i>
                        </button>
                    </div>
                </div>
            </div>
<div id="mobile-menu" class="mobile-menu hidden md:hidden">
                <a href="#" class="block nav-link active">Browse</a>
                <a href="#" class="block nav-link">Categories</a>
                <a href="#" class="block nav-link">My Library</a>
            </div>
        </nav>

    <main class="pt-20"></main>

    <section id="readerSection" class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-semibold">The Name of the Wind</h1>
                <p class="text-lg text-gray-500 mt-2">Chapter 1</p>
                <button onclick="toggleMode()"
                    class="mt-4 px-5 py-2 rounded-lg bg-indigo-900 text-white hover:bg-indigo-800 transition">
                    Đổi chế độ đọc
                </button>
            </div>

            <div id="pageMode">
                <div class="reader-stage relative bg-white rounded-2xl shadow-xl overflow-hidden">
                    <img id="pageImage" src="https://picsum.photos/800/1200?1" class="w-full object-contain bg-black" alt="Book page">
                    <button onclick="prevPage()" class="page-side-btn page-side-left" aria-label="Trang trước">←</button>
                    <button onclick="nextPage()" class="page-side-btn page-side-right" aria-label="Trang sau">→</button>
                </div>
                <p id="pageNumber" class="text-center mt-4 font-medium">Trang 1 / 1</p>
            </div>

            <div id="scrollMode" class="hidden space-y-6">
                <div class="rounded-2xl shadow-xl overflow-hidden">
                    <img src="https://picsum.photos/800/1200?1" class="w-full object-contain" alt="Book page 1">
                    <img src="https://picsum.photos/800/1200?2" class="w-full object-contain" alt="Book page 2">
                    <img src="https://picsum.photos/800/1200?3" class="w-full object-contain" alt="Book page 3">
                    <img src="https://picsum.photos/800/1200?4" class="w-full object-contain" alt="Book page 4">
                    <img src="https://picsum.photos/800/1200?5" class="w-full object-contain" alt="Book page 5">
                    <img src="https://picsum.photos/800/1200?1" class="w-full object-contain" alt="Book page 6">
                    <img src="https://picsum.photos/800/1200?2" class="w-full object-contain" alt="Book page 7">
                    <img src="https://picsum.photos/800/1200?3" class="w-full object-contain" alt="Book page 8">
                    <img src="https://picsum.photos/800/1200?4" class="w-full object-contain" alt="Book page 9">
                    <img src="https://picsum.photos/800/1200?5" class="w-full object-contain" alt="Book page 10">
                    <img src="https://picsum.photos/800/1200?1" class="w-full object-contain" alt="Book page 11">
                    <img src="https://picsum.photos/800/1200?2" class="w-full object-contain" alt="Book page 12">
                    <img src="https://picsum.photos/800/1200?3" class="w-full object-contain" alt="Book page 13">
                    <img src="https://picsum.photos/800/1200?4" class="w-full object-contain" alt="Book page 14">
                    <img src="https://picsum.photos/800/1200?5" class="w-full object-contain" alt="Book page 15">
                    <img src="https://picsum.photos/800/1200?1" class="w-full object-contain" alt="Book page 16">
                    <img src="https://picsum.photos/800/1200?2" class="w-full object-contain" alt="Book page 17">
                    <img src="https://picsum.photos/800/1200?3" class="w-full object-contain" alt="Book page 18">
                    <img src="https://picsum.photos/800/1200?4" class="w-full object-contain" alt="Book page 19">
                    <img src="https://picsum.photos/800/1200?5" class="w-full object-contain" alt="Book page 20">
                </div>
            </div>

            <div class="chapter-nav-center mt-8 flex justify-center items-center gap-4">
                <button id="prevChapterBtn" class="px-6 py-3 rounded-xl bg-gray-700 text-white hover:bg-gray-600 transition">
                    ← Chapter trước
                </button>
                <button id="nextChapterBtn" class="px-6 py-3 rounded-xl bg-indigo-900 text-white hover:bg-indigo-800 transition">
                    Chapter sau →
                </button>
            </div>
        </div>
    </section>

    <script>
        let currentPage = 1;
        let totalPages = 0;
        let pageSources = [];

        const pageImage = document.getElementById("pageImage");
        const pageNumber = document.getElementById("pageNumber");
        const readerSection = document.getElementById("readerSection");
        const scrollMode = document.getElementById("scrollMode");
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get("book");
        let currentChapter = parseInt(params.get("chapter")) || 1;

        function refreshPages() {
            pageSources = Array.from(scrollMode.querySelectorAll("img"))
                .map((img) => img.getAttribute("src"))
                .filter(Boolean);
            totalPages = pageSources.length;

            if (totalPages === 0) {
                currentPage = 0;
                pageImage.removeAttribute("src");
                pageNumber.innerText = "Trang 0 / 0";
                return;
            }

            if (currentPage < 1) currentPage = 1;
            if (currentPage > totalPages) currentPage = totalPages;
            updatePage(false);
        }

        function updatePage(scrollToTop = true) {
            if (totalPages === 0) {
                pageNumber.innerText = "Trang 0 / 0";
                return;
            }

            pageImage.src = pageSources[currentPage - 1];
            pageNumber.innerText = `Trang ${currentPage} / ${totalPages}`;
            localStorage.setItem("lastPage", currentPage);

            if (scrollToTop) {
                readerSection.scrollIntoView({ behavior: "smooth" });
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                updatePage();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                updatePage();
            }
        }

        function toggleMode() {
            const pageMode = document.getElementById("pageMode");
            pageMode.classList.toggle("hidden");
            scrollMode.classList.toggle("hidden");

            const isScroll = !scrollMode.classList.contains("hidden");
            localStorage.setItem("readingMode", isScroll ? "scroll" : "page");
        }

        window.onload = function () {
            refreshPages();

            const savedPage = parseInt(localStorage.getItem("lastPage"), 10);
            if (!Number.isNaN(savedPage)) {
                currentPage = savedPage;
                if (totalPages > 0) updatePage(false);
            }

            const savedMode = localStorage.getItem("readingMode");
            if (savedMode === "scroll") {
                toggleMode();
            }
        };

        document.addEventListener("keydown", function (e) {
            if (!document.getElementById("pageMode").classList.contains("hidden")) {
                if (e.key === "ArrowRight") nextPage();
                if (e.key === "ArrowLeft") prevPage();
            }
        });

        const prevChapter = "chapter-0.html";
        const nextChapter = "chapter-2.html";

        document.getElementById("prevChapterBtn").onclick = () => {
            window.location.href = prevChapter;
        };

        document.getElementById("nextChapterBtn").onclick = () => {
            window.location.href = nextChapter;
        };

        const observer = new MutationObserver(() => {
            const oldTotal = totalPages;
            refreshPages();
            if (oldTotal !== totalPages && totalPages > 0) {
                localStorage.setItem("lastPage", Math.max(1, Math.min(currentPage, totalPages)));
            }
        });

        observer.observe(scrollMode, {
            childList: true,
            subtree: true,
            attributes: true,
            attributeFilter: ["src"]
        });
    </script>
</body>
</html>
