<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BookWorm · Read (Images)</title>
    <!-- global theme & utilities -->
    <link rel="stylesheet" href="../main/style.css">
    <!-- Tailwind for rapid layout tweaks (kept for other pages consistency) -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com" defer></script>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <style>
        .reader-slide {
            display: none;
            text-align: center;
        }

        .reader-slide.active {
            display: block;
        }

        .reader-slide img {
            max-width: 100%;
            height: auto;
            border-radius: .5rem;
        }
        #reader-container { position: relative; padding-top: 3rem; }
        #toggle-mode { background: rgba(255,255,255,0.9); }
        /* make switch icon black */
        #toggle-mode i { color: #000 !important; }
        /* navigation button details */
        #prev-page, #next-page {
            border: 2px solid var(--primary-color);
            background: var(--secondary-color);
            color: var(--white);
            transition: background 0.3s, transform 0.2s;
        }
        #prev-page:hover, #next-page:hover {
            background: var(--primary-color);
            transform: translateY(-2px);
        }
        #toggle-mode {
            border: 2px solid var(--secondary-color);
        }
        #toggle-mode:hover {
            background: var(--secondary-color);
            color: var(--white);
        }
        /* icons inside buttons should always be white, except toggle icon */
        #prev-page i, #next-page i {
            color: var(--white) !important;
        }
        /* toggle icon black for clarity */
        #toggle-mode i {
            color: var(--black) !important;
        }
    </style>
</head>

<body>
    <!-- Navbar component (identical to other pages) -->
    <header>
        <nav aria-label="Main navigation" class="fixed inset-x-0 top-0 z-50 custom-navbar border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex items-center justify-between h-16">
                    <div class="flex items-center">
                        <a href="../main/index-none.html" class="flex items-center gap-2 text-2xl font-bold">
                            <img class="h-8 w-auto" src="/img/logo.jpg" alt="BookWorm logo">
                            <span>BookWorm</span>
                        </a>
                        <div class="hidden md:block ml-10">
                            <div class="flex items-baseline space-x-4 nav-links">
                                <a href="../main/index-none.html" class="nav-link active" aria-current="page"><i
                                        class='bx bx-search'></i> Browse</a>
                                <a href="../main/categories.html" class="nav-link"><i class='bx bx-category'></i>
                                    Categories</a>
                                <a href="../main/explore.html" class="nav-link"><i class='bx bx-compass'></i>
                                    Explore</a>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="relative hidden sm:block">
                            <i
                                class='bx bx-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400'></i>
                            <input type="search" placeholder="Search books..." class="custom-input text-sm pl-10"
                                aria-label="Search books">
                        </div>
                        <a href="../login/index.html" class="getStarted flex items-center gap-1">
                            <i class='bx bx-log-in'></i><span>Get&nbsp;Started</span>
                        </a>
                        <button class="mobile-menu-btn md:hidden p-2 focus:outline-none" aria-expanded="false"
                            aria-controls="mobile-menu">
                            <span class="sr-only">Open menu</span>
                            <i class='bx bx-menu text-2xl'></i>
                        </button>
                    </div>
                </div>
            </div>
            <div id="mobile-menu" class="mobile-menu hidden md:hidden">
                <a href="../main/index-none.html" class="block nav-link active">Browse</a>
                <a href="../main/categories.html" class="block nav-link">Categories</a>
                <a href="../main/explore.html" class="block nav-link">Explore</a>
            </div>
        </nav>
    </header>

    <div class="h-16"></div>

    <!-- Reader area -->
    <main class="max-w-4xl mx-auto px-4 py-12" id="reader-main">
        <div id="reader-container" class="relative">
            <button id="toggle-mode" title="Switch read mode"
                class="btn-action btn-details text-xl px-4 py-2 absolute top-0 left-1/2 transform -translate-x-1/2 z-10">
                <i class="bx bx-sort-alt-2"></i>
            </button>
            <div id="reader-slider"></div>
        </div>
        <div class="flex justify-between mt-8 items-center">
            <button id="prev-page" class="btn-action btn-read text-lg px-5 py-3">◀ Previous</button>
            <button id="next-page" class="btn-action btn-read text-lg px-5 py-3">Next ▶</button>
        </div>

        <!-- "You may like" recommendations -->
        <section class="mt-12">
            <h2 class="text-2xl font-bold mb-4">You may like</h2>
            <div class="carousel">
                <div class="slider"></div>
            </div>
        </section>
    </main>

    <!-- Footer copied from detail page -->
    <footer class="site-footer mt-12" aria-labelledby="feedback-heading">
        <div class="footer-container">
            <div class="footer-top">
                <div class="mt-8 bg-white p-4 rounded-lg shadow">
                    <h3 class="text-lg font-bold mb-2">Community Chat</h3>
                    <p class="text-gray-500">Coming soon...</p>
                </div>
            </div>
            <div class="footer-bottom">
                <div class="contact-info">
                    <p><strong>BookWorm</strong> • hello@bookworm.vn</p>
                    <p><a href="tel:+842839301234">+84 28 3930 1234</a> • Ho Chi Minh City, Vietnam</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="../main/script-acc.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const params = new URLSearchParams(window.location.search);
            let current = parseInt(params.get('edition') || params.get('chapter') || '1') - 1;

            const sampleImages = [
                'https://via.placeholder.com/800x1200?text=Page+1',
                'https://via.placeholder.com/800x1200?text=Page+2',
                'https://via.placeholder.com/800x1200?text=Page+3',
                'https://via.placeholder.com/800x1200?text=Page+4',
                'https://via.placeholder.com/800x1200?text=Page+5'
            ];

            const slider = document.getElementById('reader-slider');
            sampleImages.forEach(src => {
                const div = document.createElement('div');
                div.className = 'reader-slide';
                div.innerHTML = `<img src="${src}" alt="Book page image">`;
                slider.appendChild(div);
            });

            const slides = slider.querySelectorAll('.reader-slide');
            let continuous = false;

            function showSlide(index) {
                if (continuous) return;
                if (index < 0 || index >= slides.length) return;
                slides.forEach((s, i) => s.style.display = i === index ? 'block' : 'none');
                current = index;
            }

            function updateMode() {
                const toggle = document.getElementById('toggle-mode');
                const prevBtn = document.getElementById('prev-page');
                const nextBtn = document.getElementById('next-page');
                if (continuous) {
                    slides.forEach(s => s.style.display = 'block');
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                    toggle.innerHTML = '<i class="bx bx-pause-circle"></i>';
                } else {
                    slides.forEach((s,i) => s.style.display = i === current ? 'block' : 'none');
                    prevBtn.style.display = '';
                    nextBtn.style.display = '';
                    toggle.innerHTML = '<i class="bx bx-sort-alt-2"></i>';
                }
            }

            document.getElementById('toggle-mode').addEventListener('click', () => {
                continuous = !continuous;
                updateMode();
            });

            document.getElementById('prev-page').addEventListener('click', () => {
                showSlide(current - 1);
            });
            document.getElementById('next-page').addEventListener('click', () => {
                showSlide(current + 1);
            });

            updateMode();
        });
    </script>
</body>

</html>
